<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" fill="#1d4ed8"/>

  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="110" fill="url(#shine)" opacity="0.15"/>

  <!-- Spray bottle body -->
  <rect x="210" y="200" width="100" height="140" rx="14" fill="white" opacity="0.95"/>
  <!-- Bottle neck -->
  <rect x="230" y="170" width="60" height="40" rx="8" fill="white" opacity="0.9"/>
  <!-- Nozzle -->
  <rect x="270" y="155" width="60" height="20" rx="10" fill="white" opacity="0.85"/>
  <!-- Trigger -->
  <path d="M270 175 Q310 175 310 210" stroke="white" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Bottle label stripe -->
  <rect x="215" y="265" width="90" height="8" rx="4" fill="#93c5fd" opacity="0.8"/>
  <rect x="215" y="283" width="70" height="6" rx="3" fill="#93c5fd" opacity="0.6"/>

  <!-- Sparkle top-left -->
  <g transform="translate(110,130)">
    <line x1="20" y1="0" x2="20" y2="40" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="20" x2="40" y2="20" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="6" y1="6" x2="34" y2="34" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="34" y1="6" x2="6" y2="34" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Sparkle top-right -->
  <g transform="translate(360,110)">
    <line x1="14" y1="0" x2="14" y2="28" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="14" x2="28" y2="14" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Sparkle bottom-right -->
  <g transform="translate(370,330)">
    <line x1="12" y1="0" x2="12" y2="24" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="12" x2="24" y2="12" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Bubbles coming from spray -->
  <circle cx="345" cy="160" r="9" fill="white" opacity="0.5"/>
  <circle cx="365" cy="143" r="6" fill="white" opacity="0.35"/>
  <circle cx="382" cy="158" r="4" fill="white" opacity="0.25"/>

  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
